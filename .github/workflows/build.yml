name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: tools/svg2compose

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Download upstream SVG sources (cached, versions pinned in IconSource classes)
    - name: Cache upstream SVG sources
      id: svg-cache
      uses: actions/cache@v4
      with:
        path: refer
        key: svg-sources-v1

    - name: Download upstream SVG sources
      if: steps.svg-cache.outputs.cache-hit != 'true'
      run: |
        set -eo pipefail
        echo "Downloading upstream icon sources..."
        mkdir -p refer && cd refer

        # Tabler Icons (archive: tabler-icons-main/)
        curl -fsSL https://github.com/tabler/tabler-icons/archive/refs/heads/main.tar.gz | tar xz
        echo "Tabler: $(ls tabler-icons-main/icons/outline/*.svg 2>/dev/null | wc -l) outline SVGs"

        # Lucide Icons (archive: lucide-main/)
        curl -fsSL https://github.com/lucide-icons/lucide/archive/refs/heads/main.tar.gz | tar xz
        echo "Lucide: $(ls lucide-main/icons/*.svg 2>/dev/null | wc -l) SVGs"

        # Phosphor Icons v2.1.0 (archive: phosphor-icons-2.1.0/ → rename)
        curl -fsSL https://github.com/phosphor-icons/phosphor-icons/archive/refs/tags/v2.1.0.tar.gz | tar xz
        mv phosphor-icons-2.1.0 phosphor-icons-master
        echo "Phosphor: $(ls phosphor-icons-master/public/assets/phosphor.iconjar/icons/*.svg 2>/dev/null | wc -l) SVGs"

        # Radix Icons (archive: icons-master/ → rename)
        curl -fsSL https://github.com/radix-ui/icons/archive/refs/heads/master.tar.gz | tar xz
        mv icons-master Radix-Icons-main
        echo "Radix: $(ls Radix-Icons-main/packages/radix-icons/icons/*.svg 2>/dev/null | wc -l) SVGs"

        # Remix Icons v4.2.0 (archive: RemixIcon-4.2.0/ → rename)
        curl -fsSL https://github.com/Remix-Design/RemixIcon/archive/refs/tags/v4.2.0.tar.gz | tar xz
        mv RemixIcon-4.2.0 RemixIcon-master
        echo "Remix: $(find RemixIcon-master/icons -name '*.svg' 2>/dev/null | wc -l) SVGs"

    - name: Build svg2compose and generate all icons
      run: |
        ./gradlew :tools:resolveSvg2Compose
        ./gradlew :generator:tabler:run \
                   :generator:lucide:run \
                   :generator:phosphor:run \
                   :generator:radix:run \
                   :generator:remix:run

    - name: Assemble
      run: ./gradlew assemble

    - name: Run tests
      run: ./gradlew test

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: tools/svg2compose

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Download upstream SVG sources (cached, versions pinned in IconSource classes)
    - name: Cache upstream SVG sources
      id: svg-cache
      uses: actions/cache@v4
      with:
        path: refer
        key: svg-sources-v1

    - name: Download upstream SVG sources
      if: steps.svg-cache.outputs.cache-hit != 'true'
      run: |
        set -eo pipefail
        echo "Downloading upstream icon sources..."
        mkdir -p refer && cd refer

        # Tabler Icons
        git clone --depth=1 https://github.com/tabler/tabler-icons.git tabler-icons-main
        echo "Tabler: $(ls tabler-icons-main/icons/outline/*.svg | wc -l) outline SVGs"

        # Lucide Icons
        git clone --depth=1 https://github.com/lucide-icons/lucide.git lucide-main
        echo "Lucide: $(ls lucide-main/icons/*.svg | wc -l) SVGs"

        # Phosphor Icons (homepage = 原 phosphor-icons 仓库重命名)
        git clone --depth=1 https://github.com/phosphor-icons/homepage.git phosphor-icons-master
        echo "Phosphor: $(ls phosphor-icons-master/public/assets/phosphor.iconjar/icons/*.svg | wc -l) SVGs"

        # Radix Icons
        git clone --depth=1 https://github.com/radix-ui/icons.git Radix-Icons-main
        echo "Radix: $(ls Radix-Icons-main/packages/radix-icons/icons/*.svg | wc -l) SVGs"

        # Remix Icons v4.2.0
        git clone --depth=1 --branch v4.2.0 https://github.com/Remix-Design/RemixIcon.git RemixIcon-master
        echo "Remix: $(find RemixIcon-master/icons -name '*.svg' | wc -l) SVGs"

    - name: Build svg2compose and generate all icons
      run: |
        chmod +x gradlew
        ./gradlew :tools:resolveSvg2Compose
        ./gradlew :generator:tabler:run \
                   :generator:lucide:run \
                   :generator:phosphor:run \
                   :generator:radix:run \
                   :generator:remix:run

    - name: Assemble
      run: ./gradlew assemble

    - name: Run tests
      run: ./gradlew test

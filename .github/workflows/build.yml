name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: tools/svg2compose

    - name: Setup Gradle with build cache
      uses: ./.github/actions/setup-gradle-cache

    # Cache the upstream/ directory (populated by each generator's DownloadIconSourceTask).
    # Gradle uses `git clone --depth=1 --branch <tagName>` per IconSource build.gradle.kts,
    # so versions are pinned there (single source of truth). Cache key includes a hash
    # of all download configs so version bumps invalidate the cache automatically.
    - name: Cache upstream SVG sources
      uses: actions/cache@v4
      with:
        path: upstream
        key: upstream-svg-v3-${{ hashFiles('generator/*/build.gradle.kts') }}
        restore-keys: |
          upstream-svg-v3-

    - name: Build svg2compose toolchain
      run: |
        chmod +x gradlew
        ./gradlew :tools:resolveSvg2Compose

    # Each :generator:X:generateIcons depends on its downloadIcons (from
    # DownloadIconSourceTask) which does `git clone --depth=1 --branch <tag>` into
    # upstream/. This replaces the old hand-maintained shell `git clone` block
    # and guarantees CI matches local behavior (versions pinned in each
    # generator's build.gradle.kts).
    - name: Generate all icon libraries
      run: |
        ./gradlew \
          :generator:tabler:generateIcons \
          :generator:lucide:generateIcons \
          :generator:phosphor:generateIcons \
          :generator:radix:generateIcons \
          :generator:remix:generateIcons \
          :generator:heroicons:generateIcons \
          :generator:iconoir:generateIcons \
          :generator:ionicons:generateIcons \
          :generator:bootstrap:generateIcons \
          :generator:boxicons:generateIcons

    - name: Assemble
      run: ./gradlew assemble

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: sample-apks
        path: sample/build/outputs/apk/
        retention-days: 7

    - name: Run tests
      run: ./gradlew test -x :sample:test
